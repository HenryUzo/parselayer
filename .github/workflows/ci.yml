name: Formatting diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  formatting:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture formatting paths
        continue-on-error: true
        run: pnpm exec prettier --list-different . 2>&1 | tee formatting-diagnostic.log

      - name: Upload formatting paths
        uses: actions/upload-artifact@v4
        with:
          name: formatting-diagnostic
          path: formatting-diagnostic.log
          retention-days: 1
