name: Install diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  install-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Capture install output
        continue-on-error: true
        run: pnpm install --no-frozen-lockfile 2>&1 | tee install-diagnostic.log

      - name: Upload install diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: install-diagnostic
          path: install-diagnostic.log
          retention-days: 1
