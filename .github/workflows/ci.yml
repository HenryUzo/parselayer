name: Lockfile refresh

on:
  pull_request:

permissions:
  contents: write

jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild lockfile
        run: |
          pnpm clean --lockfile
          pnpm install --no-frozen-lockfile

      - name: Commit refreshed lockfile
        run: |
          if [ -n "$(git status --porcelain -- pnpm-lock.yaml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pnpm-lock.yaml
            git commit -m "chore: refresh pnpm lockfile"
            git push origin HEAD:${{ github.head_ref }}
          fi
