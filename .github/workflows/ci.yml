name: Formatting diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  formatting:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: List files requiring formatting
        run: pnpm exec prettier --list-different .
