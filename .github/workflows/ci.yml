name: Lint diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APP_ENV: test
      NODE_ENV: test
      LOG_LEVEL: silent
      DATABASE_URL: postgresql://parselayer:parselayer@localhost:5432/parselayer?schema=public
      REDIS_URL: redis://localhost:6379
      OBJECT_STORAGE_ENDPOINT: http://localhost:9000
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_BUCKET: parselayer-test
      OBJECT_STORAGE_ACCESS_KEY: test
      OBJECT_STORAGE_SECRET_KEY: test-value
      OBJECT_STORAGE_FORCE_PATH_STYLE: 'true'
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Capture lint result
        continue-on-error: true
        run: pnpm lint 2>&1 | tee lint-diagnostic.log

      - name: Upload lint diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostic
          path: lint-diagnostic.log
          retention-days: 1
