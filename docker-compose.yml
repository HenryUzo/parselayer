services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parselayer
      POSTGRES_PASSWORD: parselayer
      POSTGRES_DB: parselayer
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/local/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U parselayer -d parselayer']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: parselayer
      MINIO_ROOT_PASSWORD: parselayer-local
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 parselayer parselayer-local;
      mc mb --ignore-existing local/parselayer-local;
      mc anonymous set none local/parselayer-local;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
